<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Test Badge</title>
<style>
@page {
  size: 85.6mm 54mm;
  margin: 0;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
}

body {
  margin: 0;
  padding: 0;
}

.badge-sheet {
  position: relative;
  width: 85.6mm;
  height: 54mm;
  margin: 0;
  overflow: hidden;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color: #111827;
}

.badge-side {
  position: absolute;
  overflow: hidden;
  left: 0mm;
  top: 0mm;
  width: 85.6mm;
  height: 54mm;
  background: #ffffff;
}

.badge-label {
  position: absolute;
  left: 6mm;
  top: 6mm;
  right: 6mm;
  font-size: 11pt;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.badge-desk {
  position: absolute;
  left: 6mm;
  top: 16mm;
  right: 6mm;
  font-size: 9pt;
}

.badge-qr {
  position: absolute;
  right: 6mm;
  bottom: 6mm;
  width: 18mm;
  height: 18mm;
  border: 0.4mm solid #111827;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 6pt;
  text-align: center;
}

@media print {
  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: transparent;
  }

  .badge-sheet,
  .badge-side {
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
}
</style>
</head>
<body>
<div class="badge-sheet">
  <div class="badge-side">
    <div class="badge-label">Test print</div>
    <div class="badge-desk" id="desk-name">Desk</div>
    <div class="badge-qr">QR</div>
  </div>
</div>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var deskName = params.get("desk") || "Desk";
    var node = document.getElementById("desk-name");
    if (node) {
      node.textContent = deskName;
    }
  })();
</script>
</body>
</html>
