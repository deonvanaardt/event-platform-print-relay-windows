name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Mark GitHub release as prerelease (unsigned until W-01-S11)
        type: boolean
        default: true
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/EventPlatform.PrintRelay.App/EventPlatform.PrintRelay.App.csproj
          $version = ($csproj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          if (-not $version) { throw 'Version not found in App csproj' }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Product version: $version"

      - name: Publish app (folder layout for MSI)
        run: >
          dotnet publish src/EventPlatform.PrintRelay.App/EventPlatform.PrintRelay.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -o artifacts/publish

      - name: Verify Pdfium native (win-x64)
        shell: pwsh
        run: |
          $paths = @(
            'artifacts/publish/runtimes/win-x64/native/pdfium.dll',
            'artifacts/publish/x64/pdfium.dll',
            'artifacts/publish/pdfium.dll'
          )
          if (-not ($paths | Where-Object { Test-Path $_ })) {
            Write-Error 'Pdfium native library missing from publish output.'
            exit 1
          }

      - name: Build MSI
        run: >
          dotnet build installer/EventPlatform.PrintRelay.Installer/EventPlatform.PrintRelay.Installer.wixproj
          -c Release
          -p:ProductVersion=${{ steps.version.outputs.version }}

      - name: Locate MSI output
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path installer/EventPlatform.PrintRelay.Installer/bin -Recurse -Filter '*.msi' |
            Select-Object -First 1
          if (-not $msi) { throw 'MSI not found under installer/EventPlatform.PrintRelay.Installer/bin' }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "MSI: $($msi.FullName)"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: print-relay-msi-win-x64
          path: ${{ steps.msi.outputs.path }}

      # W-01-S11: add signpath/github-action-submit-signing-request here after SignPath OSS approval.

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.msi.outputs.path }}
          prerelease: ${{ github.event_name != 'workflow_dispatch' || inputs.prerelease }}
          generate_release_notes: true
