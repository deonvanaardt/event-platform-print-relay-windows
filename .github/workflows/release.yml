name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Mark GitHub release as prerelease when MSI is unsigned (ignored for SignPath-signed tag releases)
        type: boolean
        default: true
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  windows-msi:
    runs-on: windows-latest
    env:
      # Expose token as env so step `if:` can gate signing without logging the secret.
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/EventPlatform.PrintRelay.App/EventPlatform.PrintRelay.App.csproj
          $version = ($csproj.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          if (-not $version) { throw 'Version not found in App csproj' }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Product version: $version"

      - name: Publish app (folder layout for MSI)
        run: >
          dotnet publish src/EventPlatform.PrintRelay.App/EventPlatform.PrintRelay.App.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=false
          -o artifacts/publish

      - name: Verify Pdfium native (win-x64)
        shell: pwsh
        run: |
          $paths = @(
            'artifacts/publish/runtimes/win-x64/native/pdfium.dll',
            'artifacts/publish/x64/pdfium.dll',
            'artifacts/publish/pdfium.dll'
          )
          if (-not ($paths | Where-Object { Test-Path $_ })) {
            Write-Error 'Pdfium native library missing from publish output.'
            exit 1
          }

      - name: Build MSI
        run: >
          dotnet build installer/EventPlatform.PrintRelay.Installer/EventPlatform.PrintRelay.Installer.wixproj
          -c Release
          -p:Platform=x64
          -p:ProductVersion=${{ steps.version.outputs.version }}

      - name: Locate MSI output
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path installer/EventPlatform.PrintRelay.Installer/bin -Recurse -Filter '*.msi' |
            Select-Object -First 1
          if (-not $msi) { throw 'MSI not found under installer/EventPlatform.PrintRelay.Installer/bin' }
          "path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "MSI: $($msi.FullName)"

      - name: Upload MSI artifact
        id: upload_msi
        uses: actions/upload-artifact@v4
        with:
          name: print-relay-msi-win-x64
          path: ${{ steps.msi.outputs.path }}

      - name: Sign MSI via SignPath
        if: env.SIGNPATH_API_TOKEN != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload_msi.outputs.artifact-id }}
          artifact-configuration-slug: msi-installer
          wait-for-completion: true
          output-artifact-directory: signed-msi

      - name: Resolve release MSI path
        id: release_msi
        shell: pwsh
        run: |
          $signed = Get-ChildItem -Path signed-msi -Filter '*.msi' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($signed) {
            Write-Host "Using SignPath-signed MSI: $($signed.FullName)"
            "path=$($signed.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "signed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Write-Host "Using unsigned MSI (SignPath not configured or signing skipped)."
            "path=${{ steps.msi.outputs.path }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "signed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Write GitHub Release body
        id: release_body
        shell: pwsh
        run: |
          $signed = '${{ steps.release_msi.outputs.signed }}' -eq 'true'
          $status = if ($signed) {
            '**This release:** Authenticode-signed via SignPath OSS. Customer-ready distribution.'
          } else {
            '**This release:** Unsigned — SignPath secrets not configured or signing was skipped. Internal and staging use only; SmartScreen will warn.'
          }
          @"
          ## Code signing

          Free code signing provided by [SignPath.io](https://signpath.io/), certificate by [SignPath Foundation](https://signpath.org/).

          $status

          Policy: [docs/CODE_SIGNING_POLICY.md](https://github.com/${{ github.repository }}/blob/main/docs/CODE_SIGNING_POLICY.md) · Runbook: [docs/SIGNPATH.md](https://github.com/${{ github.repository }}/blob/main/docs/SIGNPATH.md)
          "@ | Set-Content -Path release-body.md -Encoding utf8NoBOM

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_msi.outputs.path }}
          prerelease: ${{ steps.release_msi.outputs.signed != 'true' }}
          generate_release_notes: true
          body_path: release-body.md
