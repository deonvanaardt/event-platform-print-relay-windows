name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore tests/EventPlatform.PrintRelay.Core.Tests/EventPlatform.PrintRelay.Core.Tests.csproj

      - name: Test
        run: dotnet test tests/EventPlatform.PrintRelay.Core.Tests/EventPlatform.PrintRelay.Core.Tests.csproj -c Release --no-restore --verbosity normal

  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore EventPlatform.PrintRelay.sln

      - name: Build Spike
        run: dotnet build src/EventPlatform.PrintRelay.Spike/EventPlatform.PrintRelay.Spike.csproj -c Release

      - name: Build App
        run: dotnet build src/EventPlatform.PrintRelay.App/EventPlatform.PrintRelay.App.csproj -c Release

      - name: Publish App win-x64
        run: >
          dotnet publish src/EventPlatform.PrintRelay.App/EventPlatform.PrintRelay.App.csproj
          -r win-x64 --self-contained true -p:PublishSingleFile=true -c Release
          -o artifacts/app

      - name: Verify Pdfium native (win-x64)
        shell: pwsh
        run: |
          $paths = @(
            'artifacts/app/runtimes/win-x64/native/pdfium.dll',
            'artifacts/app/x64/pdfium.dll',
            'artifacts/app/pdfium.dll'
          )
          if (-not ($paths | Where-Object { Test-Path $_ })) { exit 1 }

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: print-relay-app-win-x64
          path: artifacts/app/

      - name: Publish Spike win-x64
        run: >
          dotnet publish src/EventPlatform.PrintRelay.Spike/EventPlatform.PrintRelay.Spike.csproj
          -r win-x64 --self-contained true -p:PublishSingleFile=true -c Release
          -o artifacts/spike

      - name: Upload spike artifact
        uses: actions/upload-artifact@v4
        with:
          name: print-relay-spike-win-x64
          path: artifacts/spike/
